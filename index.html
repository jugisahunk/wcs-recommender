<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WCS Song Recommender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <h1>WCS Song Recommender</h1>
    <p>West Coast Swing · Spotify</p>
  </div>
  <div class="header-right">
    <button class="btn-connect-spotify" id="btn-connect-spotify"
      title="Connect Spotify (Premium required)">
      ♪ Connect Spotify
    </button>
  </div>
</header>

<!-- ── Tabs ─────────────────────────────────────────────────────────────── -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="curated">Curated Songs</button>
  <button class="tab-btn" data-tab="approved">
    Approved
    <span class="tab-count" id="approved-count"></span>
  </button>
  <button class="tab-btn" data-tab="search">Search</button>
</nav>

<!-- ── Filters (curated tab) ────────────────────────────────────────────── -->
<div class="filters" id="filters-row">
  <div class="filter-group">
    <label>Genre</label>
    <select id="filter-genre"></select>
  </div>

  <div class="filter-group">
    <label>BPM &nbsp;<span id="bpm-range-label">85 – 120</span></label>
    <div class="bpm-dual-range" id="bpm-dual-range">
      <div class="bpm-track-bg"></div>
      <div class="bpm-track-fill" id="bpm-track-fill"></div>
      <input type="range" id="bpm-min" min="60" max="180" value="85" step="5">
      <input type="range" id="bpm-max" min="60" max="180" value="120" step="5">
    </div>
  </div>
</div>

<!-- ── Approved actions bar ──────────────────────────────────────────────── -->
<div class="approved-bar" id="approved-bar" style="display:none">
  <div class="approved-bar-import">
    <label class="approved-bar-label" for="import-playlist-input">Import from Spotify:</label>
    <input id="import-playlist-input" type="text" placeholder="Paste a Spotify playlist URL or ID…">
    <button class="btn-import-playlist" id="btn-import-playlist">Import</button>
  </div>
  <div class="approved-bar-status" id="import-status"></div>
  <div class="approved-bar-actions">
    <label class="select-all-label">
      <input type="checkbox" id="select-all-cb"> Select all
    </label>
    <button class="btn-create-playlist" id="btn-create-playlist" disabled>
      ♪ Create Spotify Playlist
    </button>
  </div>
</div>

<!-- ── Search bar (search tab) ──────────────────────────────────────────── -->
<div class="search-bar" id="search-bar-row" style="display:none">
  <input id="search-input" type="text"
    placeholder='Search artist, song title, or style…'>
  <button class="btn-search" id="btn-search">Search</button>
</div>

<!-- ── Main content ──────────────────────────────────────────────────────── -->
<main>
  <div id="tab-curated"></div>
  <div id="tab-approved" style="display:none"></div>
  <div id="tab-search"   style="display:none"></div>
</main>

<!-- ── Playlist success toast ────────────────────────────────────────────── -->
<div class="playlist-toast" id="playlist-toast" style="display:none">
  <span id="playlist-toast-msg"></span>
  <a id="playlist-toast-link" href="#" target="_blank" rel="noopener">Open in Spotify ↗</a>
  <button onclick="document.getElementById('playlist-toast').style.display='none'">✕</button>
</div>

<!-- ── Player bar ────────────────────────────────────────────────────────── -->
<div id="player-bar">
  <!-- YT iframe (hidden; fallback for legacy approved songs with YouTube video IDs) -->
  <div id="yt-player" style="display:none"></div>
  <!-- Spotify now-playing indicator — shown by default when playing via Spotify -->
  <div id="spotify-now-playing">
    <div class="spotify-bars">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="spotify-np-text">
      <span class="snp-top">Now Playing</span>
      <span class="snp-bot">via Spotify</span>
    </div>
  </div>
  <div class="player-info">
    <div class="p-title">—</div>
    <div class="p-artist"></div>
    <div class="p-bpm"></div>
  </div>
  <div class="tap-bpm">
    <button class="tap-pad" id="tap-pad" title="Click along to the beat to detect BPM">
      <span class="tap-pad-bpm" id="tap-pad-bpm">— BPM</span>
      <span class="tap-pad-hint" id="tap-pad-hint">Tap to detect</span>
    </button>
    <div class="tap-pad-actions">
      <button class="btn-tap-save" id="btn-tap-save" disabled title="Save detected BPM to this song">Save</button>
      <button class="btn-tap-reset" id="btn-tap-reset" title="Reset tap count">⟲</button>
    </div>
  </div>
  <div class="player-actions">
    <a id="player-spotify-btn" class="btn-player-spotify" href="#" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 168 168" fill="currentColor">
        <path d="M83.996.277C37.747.277.253 37.77.253 84.019c0 46.251 37.494 83.741 83.743 83.741 46.254 0 83.744-37.49 83.744-83.741 0-46.246-37.49-83.738-83.744-83.738l.001-.004zm38.404 120.78a5.217 5.217 0 0 1-7.18 1.73c-19.662-12.01-44.414-14.73-73.564-8.07a5.222 5.222 0 0 1-6.249-3.93 5.213 5.213 0 0 1 3.926-6.25c31.9-7.291 59.263-4.15 81.337 9.34 2.46 1.51 3.24 4.72 1.73 7.18zm10.25-22.805c-1.89 3.075-5.91 4.045-8.98 2.155-22.51-13.839-56.823-17.846-83.448-9.764-3.453 1.043-7.1-.903-8.148-4.35a6.538 6.538 0 0 1 4.354-8.143c30.413-9.228 68.222-4.758 94.072 11.127 3.07 1.89 4.04 5.91 2.15 8.976v-.001zm.88-23.744c-26.99-16.031-71.52-17.505-97.289-9.684-4.138 1.255-8.514-1.081-9.768-5.219a7.835 7.835 0 0 1 5.221-9.771c29.581-8.98 78.756-7.245 109.83 11.202a7.823 7.823 0 0 1 2.74 10.733c-2.2 3.722-7.02 4.949-10.734 2.739z"/>
      </svg>
      Open in Spotify
    </a>
    <button class="btn-close-player" id="btn-close-player" title="Close player">✕</button>
  </div>
</div>

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<script src="https://www.youtube.com/iframe_api"></script>
<script src="songs.js"></script>
<script src="app.js"></script>

</body>
</html>
